<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HLS Service</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
  <style>
    body { background-color: #0b0c10; }
    .bg-dark-card { background-color: #1f2833; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0b0c10; }
    ::-webkit-scrollbar-thumb { background: #1f2833; border-radius: 3px; }
    
    .prose pre { 
      background-color: #111827 !important; 
      padding: 1rem; 
      border-radius: 0.5rem; 
      margin: 0.5rem 0; 
      position: relative;
    }
    .prose code { color: #f3f4f6; }

    .copy-btn {
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
      background-color: #1f2833;
      color: #9ca3af;
      border: 1px solid #374151;
      padding: 0.25rem 0.5rem;
      border-radius: 0.375rem;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .copy-btn:hover {
      background-color: #5865F2;
      color: #ffffff;
    }

    /* 💡 실시간 답변 로딩 스피너 애니메이션 */
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .spinner {
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-top: 2px solid #5865F2;
      border-radius: 50%;
      width: 14px;
      height: 14px;
      animation: spin 0.8s linear infinite;
    }
  </style>
</head>
<body class="text-gray-200 h-screen flex flex-col justify-between font-sans">

  <div id="auth-overlay" class="fixed inset-0 bg-black bg-opacity-90 flex items-center justify-center z-50">
    <div class="bg-gray-900 p-8 rounded-xl border border-gray-800 w-full max-w-md text-center shadow-2xl">
      <div class="mb-4 flex justify-center">
        <div class="w-16 h-16 bg-white rounded-full flex items-center justify-center text-black font-bold text-xl">HLS</div>
      </div>
      <h2 class="text-2xl font-bold mb-2">Access Key Required</h2>
      <p class="text-sm text-gray-400 mb-6">서비스를 이용하시려면 관리자에게 받은 고유 키를 입력해주세요.</p>
      <input type="password" id="secret-key-input" placeholder="고유 키를 입력하세요" 
        class="w-full p-3 bg-black border border-gray-700 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:border-[#5865F2] mb-4 text-center">
      <button id="auth-submit-btn" onclick="validateKeyOnServer()" class="w-full bg-[#5865F2] hover:bg-[#4752c4] text-white font-medium p-3 rounded-lg transition-colors flex justify-center items-center space-x-2">
        <span>인증 및 접속하기</span>
      </button>
      <p id="auth-error" class="text-red-500 text-sm mt-3 hidden">키를 입력해주세요.</p>
    </div>
  </div>

  <header class="border-b border-gray-800 bg-[#0b0c10] px-6 py-4 flex justify-between items-center shrink-0">
    <div class="flex items-center space-x-3">
      <span class="font-extrabold text-xl tracking-wider text-white">HLS <span class="text-[#5865F2] text-sm font-normal">AI Service</span></span>
    </div>
  </header>

  <main id="chat-container" class="flex-1 overflow-y-auto p-6 max-w-4xl w-full mx-auto space-y-6">
    <div id="welcome-message" class="text-center py-20 space-y-4">
      <div class="text-5xl">🦎</div>
      <h1 class="text-3xl font-bold text-white">무엇을 도와드릴까요?</h1>
      <p class="text-gray-400 max-w-md mx-auto text-sm">HLS Service : H4N 의 무료 LLM 서비스 (서비스 이용시 이용약관 동의로 간주함)</p>
      <p class="text-gray-400 max-w-md mx-auto text-sm">이용약관 보기 : https://fly-h4n33.github.io/license_HLS </p>
    </div>
  </main>

  <footer class="p-4 bg-[#0b0c10] shrink-0 border-t border-gray-900">
    <div class="max-w-4xl w-full mx-auto relative space-y-3">
      
      <div class="flex flex-col sm:flex-row sm:items-center space-y-1 sm:space-y-0 sm:space-x-3 bg-gray-950 p-3 rounded-xl border border-gray-800">
        <label for="model-selector" class="text-xs font-bold text-gray-400 uppercase tracking-wider shrink-0">MODEL SELECT:</label>
        <select id="model-selector" onchange="updateModelDescription()" class="bg-gray-900 border border-gray-700 rounded-lg text-white text-xs p-1.5 focus:outline-none focus:border-[#5865F2] cursor-pointer">
          <option value="light">Light HLS</option>
          <option value="pro" selected>HLS PRO</option>
        </select>
        <span id="model-description" class="text-xs text-gray-400 italic transition-all">
          HLS PRO는 고성능 모델입니다. 하지만 답변이 몇 분 걸릴 수 있습니다.
        </span>
      </div>

      <form id="chat-form" onsubmit="handleSubmit(event)" class="relative bg-gray-900 border border-gray-800 rounded-xl focus-within:border-[#5865F2] transition p-2 flex flex-col">
        <textarea id="user-input" rows="3" placeholder="메시지를 입력하세요..." required maxlength="5000"
          class="w-full bg-transparent resize-none focus:outline-none p-2 text-white placeholder-gray-500 text-sm"></textarea>
        <div class="flex justify-between items-center pt-2 px-2 border-t border-gray-800 mt-2">
          <span id="char-counter" class="text-xs text-gray-500">0 / 5,000</span>
          <button type="submit" id="send-btn" class="bg-[#5865F2] hover:bg-[#4752c4] text-white px-4 py-2 rounded-lg text-sm font-medium transition">
            전송
          </button>
        </div>
      </form>
    </div>
  </footer>

  <script>
    const WORKER_HTTP_URL = "https://hws.hanjungyeop33.workers.dev/"; 
    const WORKER_WS_URL = "wss://hws.hanjungyeop33.workers.dev/"; 

    let chatHistory = []; 
    let userAccessKey = "";

    const userInput = document.getElementById('user-input');
    const charCounter = document.getElementById('char-counter');
    const chatContainer = document.getElementById('chat-container');
    const welcomeMessage = document.getElementById('welcome-message');
    const authError = document.getElementById('auth-error');
    const authSubmitBtn = document.getElementById('auth-submit-btn');
    const modelSelector = document.getElementById('model-selector');
    const modelDescription = document.getElementById('model-description');

    document.getElementById('secret-key-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        validateKeyOnServer();
      }
    });

    function updateModelDescription() {
      const selected = modelSelector.value;
      if (selected === "light") {
        modelDescription.textContent = "Light HLS는 가볍고 빠른 모델입니다. 그 대가로 낮은 성능을 지녔죠.";
      } else {
        modelDescription.textContent = "HLS PRO는 고성능 모델입니다. 하지만 답변이 몇 분 걸릴 수 있습니다.";
      }
    }

    async function validateKeyOnServer() {
      const inputVal = document.getElementById('secret-key-input').value.trim();
      if (inputVal === "") { 
        authError.textContent = "키를 입력해주세요.";
        authError.classList.remove('hidden');
        return;
      }

      authSubmitBtn.disabled = true;
      authSubmitBtn.innerHTML = "<span>검증 중...</span>";
      authError.classList.add('hidden');

      try {
        const response = await fetch(WORKER_HTTP_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "X-Access-Key": inputVal 
          },
          body: JSON.stringify({ action: "validate" })
        });

        if (!response.ok) {
          const errData = await response.json().catch(() => ({}));
          throw new Error(errData.error || "인증에 실패했습니다.");
        }

        userAccessKey = inputVal;
        document.getElementById('auth-overlay').classList.add('hidden');

      } catch (error) {
        authError.textContent = error.message;
        authError.classList.remove('hidden');
      } finally {
        authSubmitBtn.disabled = false;
        authSubmitBtn.innerHTML = "<span>인증 및 접속하기</span>";
      }
    }

    userInput.addEventListener('input', () => {
      charCounter.textContent = `${userInput.value.length.toLocaleString()} / 5,000`;
    });

    userInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        document.getElementById('chat-form').requestSubmit();
      }
    });

    function escapeHtml(string) {
      return String(string).replace(/[&<>"'`=\/]/g, function (s) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;', '/': '&#x2F;', '=': '&#x3D;' }[s];
      });
    }

    // 💡 답변 출력 말풍선 내부 우측 상단에 실시간 로딩 모션 추가
    function createAssistantBubble() {
      if (welcomeMessage) welcomeMessage.style.display = 'none';
      const wrapper = document.createElement('div');
      wrapper.className = 'flex w-full justify-start';
      
      wrapper.innerHTML = `
        <div class="max-w-[85%] sm:max-w-2xl rounded-2xl p-4 bg-gray-950 text-gray-100 border border-gray-800 rounded-bl-none shadow-md w-full relative">
          <div class="flex justify-between items-center mb-2">
            <div class="text-xs font-semibold uppercase tracking-wider text-gray-400">H4N EXPERT</div>
            <div class="streaming-indicator flex items-center space-x-1.5 text-[11px] text-[#5865F2] font-medium bg-[#5865F2] bg-opacity-10 px-2 py-0.5 rounded-md">
              <div class="spinner"></div>
              <span class="animate-pulse">답변 생성 중</span>
            </div>
          </div>
          <div class="prose prose-invert text-sm break-words leading-relaxed max-w-none chat-content-area"></div>
        </div>
      `;
      chatContainer.appendChild(wrapper);
      chatContainer.scrollTop = chatContainer.scrollHeight;
      return {
        wrapper: wrapper,
        contentArea: wrapper.querySelector('.chat-content-area'),
        indicator: wrapper.querySelector('.streaming-indicator')
      };
    }

    function injectCopyButtons(targetElement) {
      const preBlocks = targetElement.querySelectorAll('pre');
      preBlocks.forEach((pre) => {
        if (pre.querySelector('.copy-btn')) return;

        const button = document.createElement('button');
        button.className = 'copy-btn';
        button.innerText = '복사';

        button.addEventListener('click', async () => {
          const codeText = pre.querySelector('code')?.innerText || '';
          try {
            await navigator.clipboard.writeText(codeText);
            button.innerText = '완료!';
            button.style.backgroundColor = '#10B981'; 
            setTimeout(() => {
              button.innerText = '복사';
              button.style.backgroundColor = '';
            }, 2000);
          } catch (err) {
            button.innerText = '실패';
          }
        });

        pre.appendChild(button);
      });
    }

    function appendUserMessage(text) {
      if (welcomeMessage) welcomeMessage.style.display = 'none';
      const wrapper = document.createElement('div');
      wrapper.className = 'flex w-full justify-end';
      wrapper.innerHTML = `
        <div class="max-w-[85%] sm:max-w-2xl rounded-2xl p-4 bg-[#5865F2] text-white rounded-br-none shadow-md">
          <div class="text-xs font-semibold uppercase tracking-wider mb-1 text-gray-400">You</div>
          <div class="prose prose-invert text-sm break-words leading-relaxed max-w-none">${escapeHtml(text)}</div>
        </div>
      `;
      chatContainer.appendChild(wrapper);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function showLoading() {
      const loader = document.createElement('div');
      loader.id = 'loading-bubble';
      loader.className = 'flex w-full justify-start';
      loader.innerHTML = `
        <div class="bg-gray-950 text-gray-400 border border-gray-800 rounded-2xl rounded-bl-none p-4 shadow-md w-24">
          <div class="flex items-center space-x-2 justify-center">
            <div class="w-2 h-2 bg-gray-500 rounded-full animate-bounce" style="animation-delay: 0ms"></div>
            <div class="w-2 h-2 bg-gray-500 rounded-full animate-bounce" style="animation-delay: 150ms"></div>
            <div class="w-2 h-2 bg-gray-500 rounded-full animate-bounce" style="animation-delay: 300ms"></div>
          </div>
        </div>
      `;
      chatContainer.appendChild(loader);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function removeLoading() {
      const loader = document.getElementById('loading-bubble');
      if (loader) loader.remove();
    }

    function showError(message) {
      removeLoading();
      const errWrapper = document.createElement('div');
      errWrapper.className = 'flex w-full justify-center';
      errWrapper.innerHTML = `
        <div class="bg-red-900 bg-opacity-40 text-red-200 border border-red-800 text-xs px-4 py-2 rounded-lg">
          🚨 에러 발생: ${message}
        </div>
      `;
      chatContainer.appendChild(errWrapper);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    async function handleSubmit(event) {
      event.preventDefault();
      const text = userInput.value.trim();
      if (!text) return;

      appendUserMessage(text);
      chatHistory.push({ role: 'user', content: text });
      userInput.value = '';
      charCounter.textContent = '0 / 5,000';
      showLoading();

      let assistantText = "";
      let bubbleElements = null;
      let buffer = ""; 

      const socketUrl = `${WORKER_WS_URL}?key=${encodeURIComponent(userAccessKey)}`;
      const socket = new WebSocket(socketUrl);

      socket.onopen = () => {
        socket.send(JSON.stringify({ 
          modelType: modelSelector.value,
          messages: chatHistory 
        }));
      };

      socket.onmessage = (msgEvent) => {
        removeLoading();
        
        buffer += msgEvent.data;
        const lines = buffer.split("\n");
        buffer = lines.pop(); 

        for (const line of lines) {
          const cleanedLine = line.trim();
          if (!cleanedLine || !cleanedLine.startsWith("data:")) continue;

          const jsonStr = cleanedLine.replace(/^data:\s*/, "");
          if (jsonStr === "[DONE]") {
            socket.close(); 
            break;
          }

          try {
            const parsed = JSON.parse(jsonStr);
            const delta = parsed.choices?.[0]?.delta?.content;
            if (delta) {
              if (!bubbleElements) {
                bubbleElements = createAssistantBubble();
              }
              assistantText += delta;
              bubbleElements.contentArea.innerHTML = marked.parse(assistantText);
              
              injectCopyButtons(bubbleElements.contentArea);
              chatContainer.scrollTop = chatContainer.scrollHeight;
            }
          } catch (e) { }
        }
      };

      socket.onclose = (closeEvent) => {
        removeLoading();
        if (bubbleElements && assistantText) {
          Prism.highlightAllIn(bubbleElements.wrapper);
          injectCopyButtons(bubbleElements.contentArea);
          
          // 💡 스트리밍 종료 시점에 로딩 모션 인디케이터 숨기기
          if (bubbleElements.indicator) {
            bubbleElements.indicator.remove();
          }
          
          chatHistory.push({ role: 'assistant', content: assistantText });
        }
        if (!closeEvent.wasClean && assistantText === "") {
          showError("서버와의 웹소켓 연결이 예기치 않게 종료되었습니다.");
        }
      };

      socket.onerror = (error) => {
        showError("웹소켓 통신 중 장애가 발생했습니다.");
      };
    }
  </script>
</body>
</html>
